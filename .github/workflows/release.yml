name: release

# Build the desktop app for macOS + Windows and attach installers to a Release.
# Trigger by pushing a version tag, e.g.:  git tag v0.2.0 && git push origin v0.2.0
on:
  push:
    tags: ["v*"]
  workflow_dispatch: {} # allow manual runs from the Actions tab

permissions:
  contents: write # needed to create the Release

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash # consistent `cd x && y` on both OSes
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # Library (builds dist via the prepare script) + server + web + desktop deps.
      - run: npm install
      - run: cd app/server && npm install
      - run: cd app/web && npm install
      - run: cd app/desktop && npm install

      # prepack.mjs stages the server + downloads the OS-native Chromium, then
      # electron-builder produces the host-OS installer (DMG on mac, NSIS .exe on
      # Windows) into app/desktop/release. Both unsigned.
      - run: cd app/desktop && npm run dist
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false" # macOS: unsigned

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app/desktop/release/*.dmg
            app/desktop/release/*.zip
            app/desktop/release/*.exe
          generate_release_notes: true
